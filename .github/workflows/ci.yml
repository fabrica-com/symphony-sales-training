name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-migrations:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: ローカル Supabase を起動して Migration を検証
        run: supabase db start

      - name: Migration リストを確認
        run: supabase migration list
